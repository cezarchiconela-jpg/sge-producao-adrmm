{% extends "base.html" %}
{% block title %}Redefinir senha | SGE{% endblock %}
{% block content %}
<section class="sge-page-header"><div class="sge-page-eyebrow"><i class="bi bi-key"></i> Segurança</div><h1>Redefinir palavra-passe</h1><p>Utilizador: <strong>{{ user.username }}</strong> · {{ user.role_label }}</p></section>
<div class="sge-card sge-panel" style="max-width:760px">
  <form method="post" class="row g-3">
    <div class="col-md-8"><label class="form-label">Nova palavra-passe</label><input name="password" type="password" class="form-control" required minlength="8" autocomplete="new-password"></div>
    <div class="col-md-4"><label class="form-label">Troca obrigatória</label><select name="must_change_password" class="form-select"><option value="1">Sim</option><option value="0">Não</option></select></div>
    <div class="col-12 d-flex gap-2 flex-wrap"><button class="btn btn-primary">Redefinir senha</button><a class="btn btn-outline-secondary" href="{{ url_for('usuarios_list') }}">Cancelar</a></div>
  </form>
</div>
{% endblock %}
