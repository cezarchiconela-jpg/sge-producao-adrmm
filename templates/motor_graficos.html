<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><title>Gráficos de motores</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>body{margin:0;background:#f4f7fb;font-family:Segoe UI,Arial;color:#162033}.wrap{max-width:1200px;margin:auto;padding:22px}.hero{background:#0b3d91;color:white;border-radius:22px;padding:22px}.card{background:white;border:1px solid #e5e7eb;border-radius:20px;padding:16px;margin-top:16px}.filters{display:flex;gap:10px;flex-wrap:wrap}select,input{padding:10px;border:1px solid #dbe3ef;border-radius:12px}.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:800;text-decoration:none;background:#0b3d91;color:white}canvas{width:100%;height:360px;border:1px solid #e5e7eb;border-radius:16px}</style></head><body><div class="wrap"><div class="hero"><h1>Gráficos de Motores</h1><p>Visualização simples das medições directas registadas no módulo Motores.</p></div><form class="card filters" method="get"><select name="equipamento_id"><option value="">Escolha o equipamento</option>{% for e in equipamentos %}<option value="{{e[0]}}" {% if equip_id|string==e[0]|string %}selected{% endif %}>{{e[2]}} — {{e[1]}}</option>{% endfor %}</select><input type="date" name="ini" value="{{data_ini}}"><input type="date" name="fim" value="{{data_fim}}"><button class="btn">Carregar</button><a class="btn" href="/motores">Voltar</a></form><div class="card"><canvas id="chart" width="1100" height="360"></canvas></div></div><script>
const labels={{ datas|tojson }}, p={{ p_kw|tojson }}, fp={{ fp|tojson }}, corr={{ corrente|tojson }};const c=document.getElementById('chart'),ctx=c.getContext('2d');function draw(){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);const pad=45,W=c.width-pad*2,H=c.height-pad*2;let vals=[...p.filter(x=>x!=null),...corr.filter(x=>x!=null),...fp.filter(x=>x!=null).map(x=>x*100)];let max=Math.max(...vals,10),n=Math.max(labels.length,1);ctx.strokeStyle='#e5e7eb';for(let i=0;i<6;i++){let y=pad+H*i/5;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(pad+W,y);ctx.stroke()}function line(arr,color,scale=1){ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();arr.forEach((v,i)=>{if(v==null)return;let x=pad+(W*(i/(Math.max(n-1,1))));let y=pad+H-(H*((v*scale)/max));if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.stroke()}line(p,'#0b3d91');line(corr,'#159957');line(fp,'#b45309',100);ctx.fillStyle='#162033';ctx.fillText('Azul: kW | Verde: A | Castanho: FP×100',pad,20)}draw();
</script></body></html>
