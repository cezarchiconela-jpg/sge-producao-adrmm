<!doctype html><html lang="pt"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Etiquetas</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head><body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">SGE</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/equipamentos">Equipamentos</a>
      <a class="nav-link" href="/equipamentos/dashboard">Dashboard</a>
      <a class="nav-link" href="/equipamentos/duplicados">Duplicados</a>
      <a class="nav-link" href="/equipamentos/filtros">Filtros</a>
    </div>
  </div>
</nav>
<div class="container pb-5">

<h3>Etiquetas — Opções</h3>
<form class="row g-2" method="get" action="/equipamentos/labels_custom.pdf">
  <div class="col-6 col-md-2"><input class="form-control" type="number" name="cols" placeholder="Colunas (3)" value="3"></div>
  <div class="col-6 col-md-2"><input class="form-control" type="number" name="rows" placeholder="Linhas (8)" value="8"></div>
  <div class="col-6 col-md-2"><input class="form-control" type="number" name="margem_x_mm" placeholder="Margem X (mm)" value="10"></div>
  <div class="col-6 col-md-2"><input class="form-control" type="number" name="margem_y_mm" placeholder="Margem Y (mm)" value="10"></div>
  <div class="col-6 col-md-2"><input class="form-control" type="number" name="densidade" placeholder="Densidade (0.5)" step="0.05" value="0.5"></div>
  <div class="col-6 col-md-2 d-grid"><button class="btn btn-primary">Gerar PDF</button></div>
</form>
<p class="text-muted small mt-2">Usa a seleção da lista (bulk → labels) ou passe <code>?ids=1,2,3</code>.</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
