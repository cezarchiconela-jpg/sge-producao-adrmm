<!doctype html><html lang="pt"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Filtros - Equipamentos</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head><body class="bg-light">
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="mb-0">Filtros Salvos (Equipamentos)</h3>
    <a class="btn btn-secondary" href="/equipamentos">Voltar</a>
  </div>

  <form method="post" class="card p-3 mb-3">
    <div class="row g-2">
      <div class="col-md-3"><input name="name" class="form-control" placeholder="Nome do filtro"></div>
      <div class="col-md-3"><input name="q" class="form-control" placeholder="Pesquisa avançada (ex: fabricante:WEG ano>=2015)"></div>
      <div class="col-md-2"><input name="categoria" class="form-control" placeholder="Categoria"></div>
      <div class="col-md-2"><input name="fabricante" class="form-control" placeholder="Fabricante"></div>
      <div class="col-md-2"><input name="modelo" class="form-control" placeholder="Modelo"></div>
    </div>
    <div class="row g-2 mt-2">
      <div class="col-md-2"><input name="criticidade" class="form-control" placeholder="Criticidade"></div>
      <div class="col-md-2"><input name="ano_min" class="form-control" placeholder="Ano ≥"></div>
      <div class="col-md-2"><input name="ano_max" class="form-control" placeholder="Ano ≤"></div>
      <div class="col-md-2 form-check d-flex align-items-center">
        <input class="form-check-input me-1" type="checkbox" name="incluir_inativos" value="1" id="inativos">
        <label for="inativos" class="form-check-label">Incluir inativos</label>
      </div>
      <div class="col-md-2 d-grid"><button class="btn btn-primary">Guardar filtro</button></div>
    </div>
  </form>

  <div class="card">
    <div class="table-responsive">
      <table class="table table-sm table-hover align-middle mb-0">
        <thead class="table-light"><tr><th>#</th><th>Nome</th><th>Query</th><th>Criado em</th><th class="text-end">Ações</th></tr></thead>
        <tbody>
          {% for r in filtros %}
          <tr>
            <td>{{ r[0] }}</td>
            <td>{{ r[2] }}</td>
            <td><code class="small">{{ r[3] }}</code></td>
            <td>{{ r[4] }}</td>
            <td class="text-end">
              {% set qj = r[3]|safe %}
              <a class="btn btn-sm btn-outline-primary" href="/equipamentos">Aplicar</a>
              <a class="btn btn-sm btn-outline-danger" href="/equipamentos/filtros/{{ r[0] }}/delete">Remover</a>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
