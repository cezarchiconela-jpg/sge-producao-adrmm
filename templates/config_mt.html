
{% extends "base.html" %}
{% block title %}Configuração MT{% endblock %}
{% block content %}
<div class="page-header"><h3>Configuração MT (Global)</h3><p>Parâmetros de faturação e referências de cálculo para o módulo de média tensão.</p></div>
<div class="section-panel p-4">
<form method="post" class="row g-3">
  <div class="col-md-2"><label class="form-label">α Reativa (limiar)</label><input name="alfa_reativa" type="number" step="0.01" class="form-control" value="{{ '%.2f'|format(cfg['alfa_reativa']) }}"></div>
  <div class="col-md-2"><label class="form-label">IVA (taxa)</label><input name="iva_taxa" type="number" step="0.01" class="form-control" value="{{ '%.2f'|format(cfg['iva_taxa']) }}"></div>
  <div class="col-md-2"><label class="form-label">Base IVA (fator)</label><input name="iva_base_factor" type="number" step="0.01" class="form-control" value="{{ '%.2f'|format(cfg['iva_base_factor']) }}"></div>
  <div class="col-md-2"><label class="form-label">Tarifa ativa (MZN/kWh)</label><input name="tarifa_ativa" type="number" step="0.001" class="form-control" value="{{ '%.3f'|format(cfg['tarifa_ativa']) }}"></div>
  <div class="col-md-2"><label class="form-label">Tarifa reativa (MZN/kVArh)</label><input name="tarifa_reativa" type="number" step="0.001" class="form-control" value="{{ '%.3f'|format(cfg['tarifa_reativa']) }}"></div>
  <div class="col-md-2"><label class="form-label">Tarifa potência (MZN/kVA)</label><input name="tarifa_potencia" type="number" step="0.001" class="form-control" value="{{ '%.3f'|format(cfg['tarifa_potencia']) }}"></div>
  <div class="col-12 d-flex gap-2"><button class="btn btn-primary mt-2">Guardar</button><a class="btn btn-outline-secondary mt-2" href="/">Voltar</a></div>
</form>
<p class="mt-3 sge-footer-note">Nota: IVA efetivo = taxa × base. Ex.: 0,16 × 0,62 = 0,0992 (9,92%).</p>
</div>
{% endblock %}
