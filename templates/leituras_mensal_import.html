
<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Importar Leituras Mensais</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
  <h3>Importar Leituras Mensais (CSV/Excel)</h3>
<div class="row g-3 my-2">
  <div class="col-md-3"><label class="form-label">Potência contratada (kVA)</label><input id="potencia_contratada" class="form-control" value="{{ local.potencia_contratada if local and local.potencia_contratada is defined else '0.00' }}" readonly></div>
  <div class="col-md-3"><label class="form-label">Fator multiplicativo</label><input id="fator_multiplicativo" class="form-control" value="{{ local.fator_mult if local and local.fator_mult is defined else '1.0000' }}" readonly></div>
  <div class="col-md-3 align-self-end"><button id="btnCalcularFatura" type="button" class="btn btn-primary">Calcular Fatura</button></div>
</div>

  <p>Formato esperado (separador ; para CSV): data;hora;ativa;reativa;ponta;fp;potc;anterior;atual;diferenca;agua;esp;acum;valor</p>
  <form method="POST" enctype="multipart/form-data" class="row g-3">
    <div class="col-md-3">
      <label class="form-label">Local</label>
      <select name="local" class="form-select" required>
        {% for l in locais %}
          <option value="{{ l }}">{{ l }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-2">
      <label class="form-label">Mês</label>
      <input type="text" name="mes" class="form-control" placeholder="MM" required>
    </div>
    <div class="col-md-2">
      <label class="form-label">Ano</label>
      <input type="number" name="ano" class="form-control" value="{{ now().year if now else 2025 }}" required>
    </div>
    <div class="col-md-5">
      <label class="form-label">Ficheiro</label>
      <input type="file" name="arquivo" class="form-control" accept=".csv,.xls,.xlsx" required>
    </div>
    <div class="col-12">
      <button class="btn btn-primary">Importar</button>
      <a href="{{ url_for('leituras_mensal') }}" class="btn btn-secondary">Voltar</a>
    </div>
  </form>
<script src="{{ url_for('static', filename='mt_leituras_mensal.js') }}"></script>
</body>
</html>
