<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Cálculo de Fatura - EDM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
  <h2>Faturação Mensal - EDM Média Tensão</h2>

  <form action="/calcular_fatura" method="post" id="formFat">
    <div class="row">
      <div class="col-md-4">
        <label for="local">Local/Cliente</label>
        <select name="local" id="local" class="form-control" required>
          <option value="">Selecione um local</option>
          {% for l in locais %}
            <option value="{{ l[1] }}" data-id="{{ l[0] }}">{{ l[1] }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-2">
        <label for="periodo">Mês/Ano</label>
        <input type="month" name="periodo" id="periodo" class="form-control" required>
      </div>
      <div class="col-md-2">
        <label for="fator_mult">Fator Multiplicativo</label>
        <input type="number" name="fator_mult" id="fator_mult" step="0.01" class="form-control" value="1" required>
      </div>
      <div class="col-md-2">
        <label for="demanda_max">Demanda Máxima (kW)</label>
        <input type="number" name="demanda_max" id="demanda_max" step="0.01" class="form-control" required>
      </div>
      <div class="col-md-2">
        <label for="pot_contratada">Potência Contratada (kW)</label>
        <input type="number" name="pot_contratada" id="pot_contratada" step="0.01" class="form-control" required>
      </div>
    </div>

    <hr>
    <h5>Leituras dos Contadores</h5>
    <div class="row">
      <div class="col-md-2"><label>Ativa Anterior</label><input type="number" name="ativa_ant" step="0.01" class="form-control" required></div>
      <div class="col-md-2"><label>Ativa Atual</label><input type="number" name="ativa_atu" step="0.01" class="form-control" required></div>
      <div class="col-md-2"><label>Reativa Anterior</label><input type="number" name="reativa_ant" step="0.01" class="form-control" required></div>
      <div class="col-md-2"><label>Reativa Atual</label><input type="number" name="reativa_atu" step="0.01" class="form-control" required></div>
      <div class="col-md-2"><label>Perdas Anterior</label><input type="number" name="perdas_ant" step="0.01" class="form-control" value="0"></div>
      <div class="col-md-2"><label>Perdas Atual</label><input type="number" name="perdas_atu" step="0.01" class="form-control" value="0"></div>
    </div>
    <div class="row mt-3">
      <div class="col-md-2"><label>Ponta Anterior</label><input type="number" name="ponta_ant" step="0.01" class="form-control" value="0"></div>
      <div class="col-md-2"><label>Ponta Atual</label><input type="number" name="ponta_atu" step="0.01" class="form-control" value="0"></div>
    </div>

    <hr>
    <h5>Tarifas e Taxas (padrões do local)</h5>
    <div class="row">
      <div class="col-md-2"><label>Tarifa Ativa</label><input type="number" name="tarifa_ativa" id="tarifa_ativa" step="0.0001" class="form-control" value="4.780" required></div>
      <div class="col-md-2"><label>Tarifa Reativa</label><input type="number" name="tarifa_reativa" id="tarifa_reativa" step="0.0001" class="form-control" value="1.430" required></div>
      <div class="col-md-2"><label>Tarifa Ponta</label><input type="number" name="tarifa_ponta" id="tarifa_ponta" step="0.0001" class="form-control" value="4.970"></div>
      <div class="col-md-2"><label>Tarifa Perdas</label><input type="number" name="tarifa_perdas" id="tarifa_perdas" step="0.0001" class="form-control" value="4.780"></div>
      <div class="col-md-2"><label>Taxa Fixa</label><input type="number" name="taxa_fixa" id="taxa_fixa" step="0.01" class="form-control" value="207.28"></div>
      <div class="col-md-2"><label>Taxa Rádio</label><input type="number" name="taxa_radio" id="taxa_radio" step="0.01" class="form-control" value="297.00"></div>
      <div class="col-md-2 mt-2"><label>Taxa Lixo</label><input type="number" name="taxa_lixo" id="taxa_lixo" step="0.01" class="form-control" value="150.00"></div>
      <div class="col-md-2 mt-2"><label>IVA (%)</label><input type="number" name="iva" id="iva" step="0.01" class="form-control" value="16.0"></div>
      <div class="col-md-2 mt-2"><label>Saldo Anterior</label><input type="number" name="saldo_ant" step="0.01" class="form-control" value="0.00"></div>
    </div>

    <div class="row mt-3">
      <div class="col-md-12"><label>Observações</label><input type="text" name="obs" class="form-control"></div>
    </div>

    <button type="submit" class="btn btn-success mt-3">Calcular Fatura</button>
    <a href="/" class="btn btn-secondary mt-3">Voltar</a>
  </form>

<script>
  // mapa de configs por local_id vindo do servidor
  const cfgMap = {{ cfg_map|tojson }};
  const selLocal = document.getElementById('local');
  const campos = {
    fator_mult: document.getElementById('fator_mult'),
    pot_contratada: document.getElementById('pot_contratada'),
    tarifa_ativa: document.getElementById('tarifa_ativa'),
    tarifa_reativa: document.getElementById('tarifa_reativa'),
    tarifa_ponta: document.getElementById('tarifa_ponta'),
    tarifa_perdas: document.getElementById('tarifa_perdas'),
    taxa_fixa: document.getElementById('taxa_fixa'),
    taxa_radio: document.getElementById('taxa_radio'),
    taxa_lixo: document.getElementById('taxa_lixo'),
    iva: document.getElementById('iva')
  };

  function aplicarPadroes(){
    const opt = selLocal.options[selLocal.selectedIndex];
    const id = opt ? opt.getAttribute('data-id') : null;
    if(!id || !cfgMap[id]) return;
    const cfg = cfgMap[id];
    Object.keys(campos).forEach(k=>{
      if(cfg[k] !== undefined && campos[k]) campos[k].value = cfg[k];
    });
  }

  selLocal.addEventListener('change', aplicarPadroes);
</script>
</body>
</html>
