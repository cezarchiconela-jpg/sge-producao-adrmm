<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>{{ 'Editar' if item else 'Novo' }} Modelo - Catálogo Lâmpadas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="mb-0">{{ 'Editar' if item else 'Novo' }} Modelo</h3>
    <a href="{{ url_for('solar_lampadas_catalogo_list') }}" class="btn btn-sm btn-outline-secondary">← Catálogo</a>
  </div>

  <form method="post" class="row g-3">
    <div class="col-md-4">
      <label class="form-label">Modelo</label>
      <input type="text" name="modelo" class="form-control"
             value="{{ item[1] if item else '' }}" required>
    </div>
    <div class="col-md-4">
      <label class="form-label">Fabricante</label>
      <input type="text" name="fabricante" class="form-control"
             value="{{ item[2] if item else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Preço (MT)</label>
      <input type="number" step="0.01" name="preco_mt" class="form-control"
             value="{{ item[8] if item else '' }}">
    </div>

    <div class="col-md-3">
      <label class="form-label">Fluxo (lm)</label>
      <input type="number" step="1" name="fluxo_lm" class="form-control"
             value="{{ item[4] if item else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Potência (W)</label>
      <input type="number" step="0.1" name="potencia_w" class="form-control"
             value="{{ item[3] if item else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Bateria (Wh)</label>
      <input type="number" step="1" name="bateria_wh" class="form-control"
             value="{{ item[5] if item else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Autonomia (h)</label>
      <input type="number" step="0.1" name="autonomia_h" class="form-control"
             value="{{ item[6] if item else '' }}">
    </div>

    <div class="col-md-3">
      <label class="form-label">Altura recomendada (m)</label>
      <input type="number" step="0.1" name="altura_poste_m" class="form-control"
             value="{{ item[7] if item else '' }}">
    </div>

    <div class="col-12">
      <label class="form-label">Nota</label>
      <textarea name="nota" class="form-control" rows="3">{{ item[9] if item else '' }}</textarea>
    </div>

    <div class="col-12">
      <button class="btn btn-success">Guardar</button>
    </div>
  </form>
</body>
</html>
