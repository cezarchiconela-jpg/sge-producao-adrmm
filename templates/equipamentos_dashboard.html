<!doctype html><html lang="pt"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard - Equipamentos</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head><body class="bg-light">
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="mb-0">Dashboard de Equipamentos</h3>
    <a class="btn btn-secondary" href="/equipamentos">Voltar</a>
  </div>

  <form class="row g-2 mb-3" method="get">
    <div class="col-md-8"><input class="form-control" name="q" value="{{ request.args.get('q','') }}" placeholder="Pesquisa avançada (opcional)"></div>
    <div class="col-md-2 d-grid"><button class="btn btn-primary">Aplicar</button></div>
  </form>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="card shadow-sm"><div class="card-body">
        <div class="text-muted">Total de equipamentos</div>
        <div class="display-6">{{ total }}</div>
      </div></div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-sm"><div class="card-body">
        <div class="text-muted">Por Criticidade</div>
        <table class="table table-sm mb-0">
          <thead><tr><th>Criticidade</th><th>Qtd</th></tr></thead>
          <tbody>
            {% for c,v in por_crit %}<tr><td>{{ c or '-' }}</td><td>{{ v }}</td></tr>{% endfor %}
          </tbody>
        </table>
      </div></div>
    </div>
    <div class="col-md-4">
      <div class="card shadow-sm"><div class="card-body">
        <div class="text-muted">Por Local</div>
        <table class="table table-sm mb-0">
          <thead><tr><th>Local</th><th>Qtd</th></tr></thead>
          <tbody>
            {% for c,v in por_local %}<tr><td>{{ c or '-' }}</td><td>{{ v }}</td></tr>{% endfor %}
          </tbody>
        </table>
      </div></div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
