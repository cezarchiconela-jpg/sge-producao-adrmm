<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Importar Leituras (CSV)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="container py-4">
  <h3>Importar Leituras (CSV)</h3>
  <p>Estrutura esperada (delimitador ;):<br>
  <code>id,datahora,local,equipamento,energia_ativa,energia_reativa,energia_aparente,pot_ativa,pot_reativa,pot_aparente,fp,ponta,caudal_elevada,corrente,tensao,observacoes</code>
  </p>
  <form method="post" enctype="multipart/form-data" class="d-flex gap-2">
    <input type="file" name="arquivo" accept=".csv" class="form-control" />
    <button class="btn btn-primary">Importar</button>
    <a href="/leituras" class="btn btn-secondary">Cancelar</a>
  </form>
</body>
</html>
