<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Config do Equipamento - SGE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
  <h2>Configurar Equipamento: {{ equipamento[1] }}</h2>
  <form method="post" class="row g-3">
    <div class="col-md-3">
      <label class="form-label">Tensão nominal (V)</label>
      <input type="number" step="0.1" name="tensao_nominal" class="form-control" value="{{ cfg[0] if cfg else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Corrente nominal (A)</label>
      <input type="number" step="0.1" name="corrente_nominal" class="form-control" value="{{ cfg[1] if cfg else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Potência nominal (kW)</label>
      <input type="number" step="0.01" name="potencia_nominal_kw" class="form-control" value="{{ cfg[2] if cfg else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">FP nominal</label>
      <input type="number" step="0.001" name="fp_nominal" class="form-control" value="{{ cfg[3] if cfg else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Eficiência nominal (0–1)</label>
      <input type="number" step="0.001" name="eficiencia_nominal" class="form-control" value="{{ cfg[4] if cfg else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Limite de corrente (A)</label>
      <input type="number" step="0.1" name="limite_corrente" class="form-control" value="{{ cfg[5] if cfg else '' }}">
    </div>
    <div class="col-md-3">
      <label class="form-label">Limite de FP</label>
      <input type="number" step="0.01" name="limite_fp" class="form-control" value="{{ cfg[6] if cfg else '0.80' }}">
    </div>
    <div class="col-12">
      <button class="btn btn-success">Salvar</button>
      <a class="btn btn-secondary" href="/equipamentos">Voltar</a>
    </div>
  </form>
</body>
</html>
