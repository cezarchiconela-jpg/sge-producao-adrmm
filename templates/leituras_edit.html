<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Editar Leitura</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="container py-4">
  <h3>Editar Leitura #{{ row[0] }}</h3>
  <form method="post" class="row g-2">
    <div class="col-md-3">
      <label class="form-label">Data/Hora</label>
      <input type="datetime-local" name="datahora" value="{{ row[1]|replace(' ','T') }}" class="form-control" />
    </div>
    <div class="col-md-3">
      <label class="form-label">Local</label>
      <input name="local" value="{{ row[2] }}" class="form-control" />
    </div>
    <div class="col-md-3">
      <label class="form-label">Equipamento</label>
      <input name="equipamento" value="{{ row[3] }}" class="form-control" />
    </div>
    <div class="col-md-3">
      <label class="form-label">Obs.</label>
      <input name="observacoes" value="{{ row[15] or '' }}" class="form-control" />
    </div>

    <div class="col-md-2"><label class="form-label">energia_ativa</label><input type="number" step="0.01" name="energia_ativa" value="{{ row[4] or 0 }}" class="form-control" /></div>
    <div class="col-md-2"><label class="form-label">energia_reativa</label><input type="number" step="0.01" name="energia_reativa" value="{{ row[5] or 0 }}" class="form-control" /></div>
    <div class="col-md-2"><label class="form-label">energia_aparente</label><input type="number" step="0.01" name="energia_aparente" value="{{ row[6] or 0 }}" class="form-control" /></div>
    <div class="col-md-2"><label class="form-label">pot_ativa</label><input type="number" step="0.01" name="pot_ativa" value="{{ row[7] or 0 }}" class="form-control" /></div>
    <div class="col-md-2"><label class="form-label">pot_reativa</label><input type="number" step="0.01" name="pot_reativa" value="{{ row[8] or 0 }}" class="form-control" /></div>
    <div class="col-md-2"><label class="form-label">pot_aparente</label><input type="number" step="0.01" name="pot_aparente" value="{{ row[9] or 0 }}" class="form-control" /></div>
    <div class="col-md-2"><label class="form-label">fp</label><input type="number" step="0.01" name="fp" value="{{ row[10] or 0 }}" class="form-control" /></div>
    <div class="col-md-2"><label class="form-label">ponta</label><input type="number" step="0.01" name="ponta" value="{{ row[11] or 0 }}" class="form-control" /></div>
    <div class="col-md-2"><label class="form-label">caudal_elevada</label><input type="number" step="0.01" name="caudal_elevada" value="{{ row[12] or 0 }}" class="form-control" /></div>
    <div class="col-md-2"><label class="form-label">corrente</label><input type="number" step="0.01" name="corrente" value="{{ row[13] or 0 }}" class="form-control" /></div>
    <div class="col-md-2"><label class="form-label">tensao</label><input type="number" step="0.01" name="tensao" value="{{ row[14] or 0 }}" class="form-control" /></div>

    <div class="col-12 mt-3">
      <button class="btn btn-primary">Salvar</button>
      <a class="btn btn-secondary" href="/leituras">Cancelar</a>
    </div>
  </form>
</body>
</html>
