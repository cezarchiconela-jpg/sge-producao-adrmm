<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8"><title>Nova medição de motor</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>
body{margin:0;background:#f4f7fb;font-family:Segoe UI,Arial;color:#162033}.wrap{max-width:1100px;margin:auto;padding:22px}.hero{background:linear-gradient(135deg,#082c68,#0f63c7,#159957);color:white;border-radius:24px;padding:24px;margin-bottom:18px}.hero h1{margin:4px 0;font-size:2rem}.card{background:#fff;border:1px solid #e5e7eb;border-radius:22px;padding:18px;box-shadow:0 12px 32px rgba(15,23,42,.06)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}label{font-size:.78rem;text-transform:uppercase;font-weight:800;color:#64748b}input,select,textarea{width:100%;padding:11px;border:1px solid #dbe3ef;border-radius:12px}textarea{min-height:90px}.full{grid-column:1/-1}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.btn{border:0;border-radius:14px;padding:11px 15px;font-weight:800;text-decoration:none;cursor:pointer}.primary{background:#0b3d91;color:white}.soft{background:#eef6ff;color:#0b3d91}.hint{background:#f8fafc;border:1px solid #e5e7eb;border-radius:16px;padding:12px;color:#475569;margin:12px 0}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:600px){.grid{grid-template-columns:1fr}.wrap{padding:12px}}
</style></head><body><div class="wrap"><section class="hero"><h1>Nova medição operacional de motor</h1><p>Registe tensão, corrente, potência, fator de potência e observações. O sistema calcula automaticamente potência aparente, reativa e energia estimada entre medições.</p></section><form method="post" class="card"><div class="grid"><div class="full"><label>Equipamento</label><select name="equipamento_id" required>{% for e in equipamentos %}<option value="{{e[0]}}">{{e[2]}} — {{e[1]}}</option>{% endfor %}</select></div><div><label>Data/hora</label><input type="datetime-local" name="datahora" value="{{now}}"></div><div><label>Fases</label><select name="fases"><option value="3">Trifásico</option><option value="1">Monofásico</option></select></div><div><label>Tensão V</label><input type="number" step="any" name="tensao_v" id="v"></div><div><label>Corrente A</label><input type="number" step="any" name="corrente_a" id="i"></div><div><label>Fator de potência</label><input type="number" step="any" min="0" max="1" name="fator_potencia" id="fp"></div><div><label>Frequência Hz</label><input type="number" step="any" name="frequencia_hz" value="50"></div><div><label>Potência ativa kW</label><input type="number" step="any" name="pot_ativa_kw" id="p"></div><div><label>Potência reativa kVAr</label><input type="number" step="any" name="pot_reativa_kvar" id="q"></div><div><label>Potência aparente kVA</label><input type="number" step="any" name="pot_aparente_kva" id="s"></div><div><label>Eficiência %</label><input type="number" step="any" name="eficiencia"></div><div class="full"><div class="hint" id="diag">Preencha tensão, corrente e FP para cálculo automático.</div></div><div class="full"><label>Observações técnicas</label><textarea name="observacoes" placeholder="Ex.: ruído, vibração, aquecimento, alteração de regime, arranque, manutenção, condição da bomba..."></textarea></div></div><div class="btns"><button class="btn primary" type="submit">Salvar e voltar</button><button class="btn soft" name="continuar" value="1" type="submit">Salvar e lançar outra</button><a class="btn soft" href="/motores">Cancelar</a></div></form></div><script>
function num(id){return parseFloat((document.getElementById(id).value||'').replace(',','.'))||0}function calc(){let v=num('v'),i=num('i'),fp=num('fp');let s=v&&i?Math.sqrt(3)*v*i/1000:0;if(s&&!num('s'))document.getElementById('s').value=s.toFixed(3);if(s&&fp&&!num('p'))document.getElementById('p').value=(s*fp).toFixed(3);let p=num('p');if(s&&p&&!num('q'))document.getElementById('q').value=Math.sqrt(Math.max(s*s-p*p,0)).toFixed(3);let msg=[];if(fp&&fp<0.8)msg.push('Alerta: FP baixo.');if(v&&(v<360||v>440))msg.push('Alerta: tensão fora da faixa 360–440 V.');document.getElementById('diag').textContent=msg.length?msg.join(' '):'Medição sem alerta crítico preliminar.'}['v','i','fp','p','s'].forEach(id=>document.getElementById(id).addEventListener('input',calc));
</script></body></html>
