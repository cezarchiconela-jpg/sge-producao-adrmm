<!doctype html><html lang="pt"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Importar (Pré-visualizar)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head><body class="bg-light">
<div class="container py-4">
  <h3>Importar (Pré-visualizar)</h3>
  <div class="alert alert-info">Este ecrã é um placeholder para o fluxo de pré-visualização. Para já, utilize as rotas de importação existentes (CSV/XLSX/JSON).</div>
  <form method="post" enctype="multipart/form-data" class="card p-3">
    <input type="file" name="arquivo" accept=".csv,.xlsx,.json" class="form-control mb-3" required>
    <div class="d-flex gap-2">
      <button class="btn btn-primary">Carregar</button>
      <a class="btn btn-secondary" href="/equipamentos">Voltar</a>
    </div>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
