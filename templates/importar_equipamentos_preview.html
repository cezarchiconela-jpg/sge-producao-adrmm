<!DOCTYPE html><html><body><h3>Pré-visualização</h3>{% if errors %}<ul>{% for ln,msg in errors %}<li>Linha {{ln}}: {{msg}}</li>{% endfor %}</ul>{% endif %}{% if rows %}<table>{% for r in rows %}<tr>{% for k,v in r.items() %}<td>{{v}}</td>{% endfor %}</tr>{% endfor %}</table><form method='post' action='{{ url_for('equipamentos_import_confirm') }}'><input type='hidden' name='preview_key' value='{{ preview_key }}'><button>Confirmar</button></form>{% endif %}</body></html>
