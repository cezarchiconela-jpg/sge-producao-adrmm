<!doctype html><html lang="pt"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Filtros</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head><body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">SGE</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/equipamentos">Equipamentos</a>
      <a class="nav-link" href="/equipamentos/dashboard">Dashboard</a>
      <a class="nav-link" href="/equipamentos/duplicados">Duplicados</a>
      <a class="nav-link" href="/equipamentos/filtros">Filtros</a>
    </div>
  </div>
</nav>
<div class="container pb-5">

<h3>Filtros Salvos</h3>

<form class="row g-2 mb-3" method="post" action="/equipamentos/filtros/salvar">
  <div class="col-12 col-md-3"><input class="form-control" name="nome" placeholder="Nome do filtro"></div>
  <div class="col-12 col-md-6"><input class="form-control" name="query" placeholder="Query atual (opcional)"></div>
  <div class="col-12 col-md-3 d-grid"><button class="btn btn-primary">Salvar com query atual</button></div>
</form>

<table class="table table-striped">
  <thead><tr><th>Nome</th><th>Query</th><th class="text-end">Ações</th></tr></thead>
  <tbody>
  {% for f in filtros %}
    <tr>
      <td>{{ f['nome'] }}</td>
      <td><code class="small">{{ f['query_json'] }}</code></td>
      <td class="text-end">
        <a class="btn btn-sm btn-outline-primary" href="/equipamentos?{{ f['query_qs'] }}">Aplicar</a>
        <a class="btn btn-sm btn-outline-danger" href="/equipamentos/filtros/{{ f['id'] }}/delete">Apagar</a>
      </td>
    </tr>
  {% endfor %}
  </tbody>
</table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
