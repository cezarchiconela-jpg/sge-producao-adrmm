<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Fatura por Leituras Mensais - SGE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
  <h2>Gerar Fatura a partir das Leituras Mensais</h2>
  <form method="post" class="row g-3">
    <div class="col-md-4">
      <label class="form-label">Local</label>
      <select name="local_id" class="form-control" required>
        <option value="">Selecione</option>
        {% for l in locais %}
        <option value="{{ l[0] }}">{{ l[1] }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-3">
      <label class="form-label">Mês</label>
      <input type="month" name="mes" class="form-control" value="{{ hoje }}" required>
    </div>
    <div class="col-12">
      <button class="btn btn-success">Calcular Fatura</button>
      <a href="/" class="btn btn-secondary">Voltar</a>
    </div>
  </form>
  <p class="text-muted mt-3">Este cálculo usa as leituras diárias da tabela "Leituras Mensais" (colunas Ativa, Reativa, Ponta), aplicando o <b>fator multiplicativo e tarifas</b> definidos em <i>locais_cfg</i>.</p>
</body>
</html>
