<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Configuração do Local — {{ local[1] if local else '' }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f7f9fc; }
    .container-narrow { max-width: 980px; }
    .card { border-radius: 12px; }
  </style>
</head>
<body class="container container-narrow py-4">
  <h2 class="mb-3 text-center">Configuração do Local - {{ local[1] if local else '' }}</h2>
<div class="row g-3 my-2">
  <div class="col-md-3"><label class="form-label">Potência contratada (kVA)</label><input id="potencia_contratada" class="form-control" value="{{ local.potencia_contratada if local and local.potencia_contratada is defined else '0.00' }}" readonly></div>
  <div class="col-md-3"><label class="form-label">Fator multiplicativo</label><input id="fator_multiplicativo" class="form-control" value="{{ local.fator_mult if local and local.fator_mult is defined else '1.0000' }}" readonly></div>
  <div class="col-md-3 align-self-end"><button id="btnCalcularFatura" type="button" class="btn btn-primary">Calcular Fatura</button></div>
</div>


  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Fator Multiplicativo</label>
            <input type="number" step="0.01" class="form-control" name="fator_mult"
                   value="{{ (cfg.fator_mult if cfg and cfg.fator_mult is defined else 1) }}">
            <div class="form-text">Ex.: 1 para medição direta; &gt;1 para TC/TP.</div>
          </div>

          <div class="col-md-4">
            <label class="form-label">Potência Contratada (kW)</label>
            <input type="number" step="0.01" class="form-control" name="pot_contratada"
                   value="{{ (cfg.pot_contratada if cfg and cfg.pot_contratada is defined else 0) }}">
          </div>

          <div class="col-md-4">
            <label class="form-label">Potência Instalada (kW)</label>
            <input type="number" step="0.01" class="form-control" name="pot_instalada"
                   value="{{ (cfg.pot_instalada if cfg and cfg.pot_instalada is defined else 0) }}">
          </div>

          <div class="col-12"><hr></div>

          <div class="col-md-3">
            <label class="form-label">Tarifa Ativa</label>
            <input type="number" step="0.001" class="form-control" name="tarifa_ativa"
                   value="{{ (cfg.tarifa_ativa if cfg and cfg.tarifa_ativa is defined else 4.780) }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Tarifa Reativa</label>
            <input type="number" step="0.001" class="form-control" name="tarifa_reativa"
                   value="{{ (cfg.tarifa_reativa if cfg and cfg.tarifa_reativa is defined else 1.430) }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Tarifa Ponta</label>
            <input type="number" step="0.001" class="form-control" name="tarifa_ponta"
                   value="{{ (cfg.tarifa_ponta if cfg and cfg.tarifa_ponta is defined else 4.970) }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Tarifa Perdas</label>
            <input type="number" step="0.001" class="form-control" name="tarifa_perdas"
                   value="{{ (cfg.tarifa_perdas if cfg and cfg.tarifa_perdas is defined else 4.780) }}">
          </div>

          <div class="col-md-3">
            <label class="form-label">Taxa Fixa</label>
            <input type="number" step="0.01" class="form-control" name="taxa_fixa"
                   value="{{ (cfg.taxa_fixa if cfg and cfg.taxa_fixa is defined else 207.28) }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Taxa Rádio</label>
            <input type="number" step="0.01" class="form-control" name="taxa_radio"
                   value="{{ (cfg.taxa_radio if cfg and cfg.taxa_radio is defined else 297.00) }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Taxa Lixo</label>
            <input type="number" step="0.01" class="form-control" name="taxa_lixo"
                   value="{{ (cfg.taxa_lixo if cfg and cfg.taxa_lixo is defined else 150.00) }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">IVA (%)</label>
            <input type="number" step="0.01" class="form-control" name="iva"
                   value="{{ (cfg.iva if cfg and cfg.iva is defined else 16.0) }}">
          </div>

          <div class="col-12">
            <hr>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">Guardar</button>
              <a href="/locais" class="btn btn-secondary">Cancelar</a>
            </div>
          </div>
        </div>
      </form>

      <div class="mt-3 text-muted small">
        <strong>Dica:</strong> estes valores ficam guardados neste local e serão auto-preenchidos
        quando selecionares este local em Leitura Mensal e Fatura.
      </div>
    </div>
  </div>
<script src="{{ url_for('static', filename='mt_leituras_mensal.js') }}"></script>
</body>
</html>
