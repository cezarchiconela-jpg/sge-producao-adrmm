{% extends "base.html" %}
{% block title %}Alterar senha | SGE{% endblock %}
{% block content %}
<section class="sge-page-header"><div class="sge-page-eyebrow"><i class="bi bi-key"></i> Minha conta</div><h1>Alterar palavra-passe</h1><p>Actualize a sua palavra-passe de acesso ao SGE.</p></section>
<div class="sge-card sge-panel" style="max-width:760px">
  <form method="post" class="row g-3">
    <div class="col-12"><label class="form-label">Palavra-passe actual</label><input name="atual" type="password" class="form-control" required autocomplete="current-password"></div>
    <div class="col-md-6"><label class="form-label">Nova palavra-passe</label><input name="nova" type="password" class="form-control" required minlength="8" autocomplete="new-password"></div>
    <div class="col-md-6"><label class="form-label">Confirmar nova palavra-passe</label><input name="confirmar" type="password" class="form-control" required minlength="8" autocomplete="new-password"></div>
    <div class="col-12 d-flex gap-2 flex-wrap"><button class="btn btn-primary">Guardar nova senha</button><a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Cancelar</a></div>
  </form>
</div>
{% endblock %}
